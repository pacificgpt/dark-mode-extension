<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dark Mode Toggle</title>
    <style>
      body {
        width: 100px; /* Reduced popup width */
        height: 50px; /* Reduced popup height */
        display: flex;
        justify-content: center;
        align-items: center;
        background: #242424;
        color: #e0e0e0;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
      }
      .toggle-btn {
        width: 50px;
        height: 25px;
        background: #555;
        border-radius: 12.5px;
        position: relative;
        cursor: pointer;
        transition: background 0.3s ease;
      }
      .toggle-btn .slider {
        width: 22px;
        height: 22px;
        background: white;
        border-radius: 50%;
        position: absolute;
        top: 1.5px;
        left: 2px;
        transition: all 0.3s ease;
      }
      .dark .toggle-btn {
        background: #0a84ff;
      }
      .dark .slider {
        left: 26px;
      }
    </style>
  </head>
  <body>
    <div class="toggle-btn" id="toggle-dark-mode">
      <div class="slider"></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
